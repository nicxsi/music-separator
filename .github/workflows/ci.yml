name: CI

# When it starts
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # GitHub puts these containers next to the job
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: music_separator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # Environment variables — replace the .env file in CI
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/music_separator_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/music_separator_test
      RABBITMQ_URL: amqp://guest:guest@localhost:5672//

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"           # caches pip between launches — faster
          # Specify the exact path to the dependency file so that there is no error
          cache-dependency-path: "backend/requirements-api.txt"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-api.txt ruff

      # Linter — checks the style and obvious errors
      - name: Lint with ruff
        working-directory: backend
        run: ruff check .

      # Applying migrations to the test database
      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      # Running the tests
      - name: Run tests
        working-directory: backend
        run: pytest -v
