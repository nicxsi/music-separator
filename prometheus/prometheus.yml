global:
  scrape_interval: 15s       # Poll every 15 seconds
  evaluation_interval: 15s

scrape_configs:
  - job_name: "music-separator-api"
    static_configs:
      - targets: ["api:8000"]    # The service name inside docker compose
    metrics_path: "/metrics"

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]   # RabbitMQ Prometheus plugin port
    metrics_path: "/metrics"
